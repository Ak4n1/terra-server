spring.datasource.url=jdbc:h2:mem:terra_api_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.config.import=
spring.devtools.add-properties=false
app.mail.from=test@l2terra.online
app.mail.frontend-verify-url=https://l2terra.online/verify-email
app.mail.frontend-reset-password-url=https://l2terra.online/reset-password

jwt.secret=testSecretKey123456789012345678901234567890
jwt.access-token-expiration-minutes=15
jwt.refresh-token-expiration-days=30
jwt.access-cookie-name=terra_access_token
jwt.refresh-cookie-name=terra_refresh_token
jwt.cookie.path=/
jwt.cookie.same-site=Lax
jwt.cookie.http-only=true
jwt.cookie.secure=false

csrf.cookie-name=XSRF-TOKEN
csrf.header-name=X-CSRF-TOKEN
csrf.path=/
csrf.same-site=Lax
csrf.secure=false
csrf.http-only=false

app.cors.allowed-origins[0]=http://localhost:4200
app.cors.allowed-methods[0]=GET
app.cors.allowed-methods[1]=POST
app.cors.allowed-methods[2]=PUT
app.cors.allowed-methods[3]=PATCH
app.cors.allowed-methods[4]=DELETE
app.cors.allowed-methods[5]=OPTIONS
app.cors.allowed-headers[0]=Content-Type
app.cors.allowed-headers[1]=X-Language
app.cors.allowed-headers[2]=Accept-Language
app.cors.allowed-headers[3]=Authorization
app.cors.allowed-headers[4]=X-CSRF-TOKEN
app.cors.allow-credentials=true

rate-limit.auth-critical.enabled=true
rate-limit.auth-critical.capacity=5
rate-limit.auth-critical.refill-tokens=5
rate-limit.auth-critical.refill-duration-seconds=60
rate-limit.auth-session.enabled=true
rate-limit.auth-session.capacity=10
rate-limit.auth-session.refill-tokens=10
rate-limit.auth-session.refill-duration-seconds=60
