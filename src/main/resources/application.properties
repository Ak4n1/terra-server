# Keep the server configurable from environment.
server.port=${SERVER_PORT:8080}

spring.application.name=terra-api

spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Common datasource configuration shared by all profiles.
spring.datasource.url=${DB_URL:jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:l2jmobiusclassic}}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA defaults. Each profile can override what differs.
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Mail configuration shared by all profiles.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:10000}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.mail.from-name=${APP_MAIL_FROM_NAME:L2 Terra}
app.mail.frontend-verify-url=${APP_MAIL_FRONTEND_VERIFY_URL:https://l2terra.online/verify-email}
app.mail.frontend-reset-password-url=${APP_MAIL_FRONTEND_RESET_PASSWORD_URL:https://l2terra.online/reset-password}
app.mail.verification-email-cooldown-seconds=${APP_MAIL_VERIFICATION_EMAIL_COOLDOWN_SECONDS:60}
app.mail.password-reset-cooldown-seconds=${APP_MAIL_PASSWORD_RESET_COOLDOWN_SECONDS:60}

# JWT and cookie security defaults shared by all profiles.
jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:30}
jwt.access-cookie-name=${JWT_ACCESS_COOKIE_NAME:terra_access_token}
jwt.refresh-cookie-name=${JWT_REFRESH_COOKIE_NAME:terra_refresh_token}
jwt.cookie.path=${JWT_COOKIE_PATH:/}
csrf.cookie-name=${CSRF_COOKIE_NAME:XSRF-TOKEN}
csrf.header-name=${CSRF_HEADER_NAME:X-CSRF-TOKEN}
csrf.path=${CSRF_PATH:/}
csrf.same-site=${CSRF_SAME_SITE:Lax}
csrf.secure=${CSRF_SECURE:false}
csrf.http-only=${CSRF_HTTP_ONLY:false}

# CORS configuration for frontend consumers.
app.cors.allowed-origins[0]=http://localhost:4200
app.cors.allowed-methods[0]=GET
app.cors.allowed-methods[1]=POST
app.cors.allowed-methods[2]=PUT
app.cors.allowed-methods[3]=PATCH
app.cors.allowed-methods[4]=DELETE
app.cors.allowed-methods[5]=OPTIONS
app.cors.allowed-headers[0]=Content-Type
app.cors.allowed-headers[1]=X-Language
app.cors.allowed-headers[2]=Accept-Language
app.cors.allowed-headers[3]=Authorization
app.cors.allowed-headers[4]=X-CSRF-TOKEN
app.cors.allow-credentials=true
app.security.trust-forwarded-headers=false
rate-limit.auth-critical.enabled=true
rate-limit.auth-critical.capacity=5
rate-limit.auth-critical.refill-tokens=5
rate-limit.auth-critical.refill-duration-seconds=60
rate-limit.auth-session.enabled=true
rate-limit.auth-session.capacity=10
rate-limit.auth-session.refill-tokens=10
rate-limit.auth-session.refill-duration-seconds=60
rate-limit.auth-session-read.enabled=true
rate-limit.auth-session-read.capacity=30
rate-limit.auth-session-read.refill-tokens=30
rate-limit.auth-session-read.refill-duration-seconds=60
rate-limit.auth-session-refresh.enabled=true
rate-limit.auth-session-refresh.capacity=6
rate-limit.auth-session-refresh.refill-tokens=6
rate-limit.auth-session-refresh.refill-duration-seconds=60
